<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Airport Taxi Trainer</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#05070b;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;touch-action:none;-webkit-user-select:none;user-select:none}#app{position:fixed;inset:0;overflow:hidden}canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.panel{position:absolute;background:rgba(0,0,0,.62);color:#fff;border:1px solid rgba(255,255,255,.24);border-radius:14px;padding:10px 12px;backdrop-filter:blur(8px);font-size:14px}.top{top:calc(10px + env(safe-area-inset-top));left:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}.clearance{top:calc(72px + env(safe-area-inset-top));left:10px;max-width:min(620px,calc(100vw - 20px))}.score{top:calc(150px + env(safe-area-inset-top));left:10px}.label{font-size:12px;color:#ffdf5d;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}button{font:inherit;border:0;border-radius:12px;padding:10px 12px;background:#f1c232;color:#111;font-weight:700;touch-action:manipulation}#controls{position:absolute;left:0;right:0;bottom:calc(16px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;padding:0 12px}#controls button{height:74px;font-size:20px;background:rgba(255,255,255,.88);border:2px solid rgba(0,0,0,.25)}#brake{background:#ff7b72!important}#throttle{background:#7ee787!important}@media (orientation:portrait){.top,.clearance,.score{font-size:12px}.score{top:calc(138px + env(safe-area-inset-top))}#controls{grid-template-columns:1fr 1fr;}.panel{padding:8px 10px}}
</style>
</head>
<body>
<div id="app">
<canvas id="sim"></canvas>
<div class="panel top"><div><strong>Airport:</strong> KSNA Demo</div><div><strong>Mode:</strong> <span id="mode">Night</span></div><button id="nightBtn">Day/Night</button><button id="resetBtn">Reset</button></div>
<div class="panel clearance"><div class="label">Ground Clearance</div><div id="clearanceText">Taxi to Runway 20R via Alpha, Alpha One. Hold short Runway 20R.</div></div>
<div class="panel score"><div><strong>Speed:</strong> <span id="speed">0</span> kt</div><div><strong>Heading:</strong> <span id="heading">270</span>°</div><div><strong>Status:</strong> <span id="status">Follow taxiway A.</span></div></div>
<div id="controls"><button id="left">◀︎ LEFT</button><button id="brake">BRAKE</button><button id="throttle">THROTTLE</button><button id="right">RIGHT ▶︎</button></div>
</div>
<script>
(() => {
const canvas=document.getElementById('sim'),ctx=canvas.getContext('2d');let W=0,H=0,night=true;const plane={x:180,y:540,heading:270,speed:0,steer:0};const runway={x:1015,y:60,w:150,h:760};const taxiways=[{name:'A',x1:120,y1:540,x2:940,y2:540,w:80},{name:'B',x1:520,y1:220,x2:520,y2:760,w:70},{name:'A1',x1:860,y1:540,x2:1030,y2:390,w:60},{name:'Ramp',x1:120,y1:650,x2:360,y2:650,w:150}];
function resize(){const d=window.devicePixelRatio||1;W=canvas.width=Math.floor(innerWidth*d);H=canvas.height=Math.floor(innerHeight*d);canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(d,0,0,d,0,0);W=innerWidth;H=innerHeight}window.addEventListener('resize',resize);resize();
const R=d=>d*Math.PI/180;function dot(x,y,c,r=4){ctx.beginPath();ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=12;ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}function rr(cx,cy,w,h,a,fill){ctx.save();ctx.translate(cx,cy);ctx.rotate(R(a));ctx.fillStyle=fill;ctx.fillRect(-w/2,-h/2,w,h);ctx.restore()}function sign(x,y,text,type){ctx.save();ctx.translate(x,y);ctx.fillStyle=type==='hold'?'#a30f12':'#111';ctx.fillRect(-46,-18,92,36);ctx.strokeStyle=type==='direction'?'#f4d03f':'#fff';ctx.lineWidth=3;ctx.strokeRect(-46,-18,92,36);ctx.fillStyle=type==='hold'?'#fff':'#f4d03f';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,0,2);ctx.restore()}
function airport(){ctx.fillStyle=night?'#0a0d12':'#6f8a64';ctx.fillRect(0,0,1200,850);ctx.fillStyle=night?'#202329':'#777b80';ctx.fillRect(70,580,360,170);rr(runway.x,runway.y+380,runway.w,runway.h,0,night?'#15181d':'#565a61');ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.setLineDash([38,28]);ctx.beginPath();ctx.moveTo(runway.x,90);ctx.lineTo(runway.x,790);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#fff';ctx.font='bold 34px sans-serif';ctx.textAlign='center';ctx.fillText('20R',runway.x,150);ctx.save();ctx.translate(runway.x,760);ctx.rotate(Math.PI);ctx.fillText('2L',0,0);ctx.restore();taxiways.forEach(t=>{ctx.strokeStyle=night?'#242830':'#64686d';ctx.lineWidth=t.w;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(t.x1,t.y1);ctx.lineTo(t.x2,t.y2);ctx.stroke();ctx.strokeStyle='#f6d344';ctx.lineWidth=4;ctx.setLineDash([28,22]);ctx.beginPath();ctx.moveTo(t.x1,t.y1);ctx.lineTo(t.x2,t.y2);ctx.stroke();ctx.setLineDash([])});ctx.strokeStyle='#f6d344';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(930,450);ctx.lineTo(990,520);ctx.stroke();ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(945,435);ctx.lineTo(1005,505);ctx.stroke();ctx.setLineDash([8,8]);ctx.beginPath();ctx.moveTo(910,470);ctx.lineTo(970,540);ctx.stroke();ctx.beginPath();ctx.moveTo(895,485);ctx.lineTo(955,555);ctx.stroke();ctx.setLineDash([]);sign(465,505,'A','location');sign(540,405,'B','location');sign(840,498,'A1 →','direction');sign(915,445,'20R-2L','hold');if(night){for(let x=140;x<940;x+=60){dot(x,493,'#376dff');dot(x,587,'#376dff')}for(let y=95;y<790;y+=46){dot(925,y,'#fff');dot(1105,y,'#fff')}dot(950,505,'#ff3333',5);dot(965,490,'#ff3333',5)}}
function cockpit(){const h=H*.54,g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,night?'#02040b':'#89b7e8');g.addColorStop(1,night?'#101525':'#d4e7ff');ctx.fillStyle=g;ctx.fillRect(0,0,W,h);const gr=ctx.createLinearGradient(0,h,0,H);gr.addColorStop(0,night?'#171a20':'#5d6268');gr.addColorStop(1,night?'#06070a':'#383b40');ctx.fillStyle=gr;ctx.fillRect(0,h,W,H-h);ctx.strokeStyle='#f6d344';ctx.lineWidth=4;ctx.setLineDash([30,28]);ctx.beginPath();ctx.moveTo(W/2,h);ctx.lineTo(W/2+Math.sin(R(plane.steer*12))*120,H);ctx.stroke();ctx.setLineDash([]);if(night){for(let i=0;i<8;i++){const y=h+40+i*55,s=80+i*45;dot(W/2-s,y,'#376dff',3+i*.25);dot(W/2+s,y,'#376dff',3+i*.25)}}if(plane.x>750){ctx.strokeStyle='#f6d344';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(W*.25,H*.72);ctx.lineTo(W*.75,H*.72);ctx.stroke();ctx.font='bold 22px sans-serif';ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText('RUNWAY HOLD SHORT 20R AHEAD',W/2,H*.68)}}
function aircraft(){ctx.save();ctx.translate(plane.x,plane.y);ctx.rotate(R(plane.heading));ctx.fillStyle='#fff';ctx.beginPath();ctx.moveTo(0,-18);ctx.lineTo(10,14);ctx.lineTo(0,8);ctx.lineTo(-10,14);ctx.closePath();ctx.fill();ctx.restore()}function update(){plane.heading+=plane.steer*plane.speed*.08;plane.x+=Math.sin(R(plane.heading))*plane.speed*.55;plane.y-=Math.cos(R(plane.heading))*plane.speed*.55;plane.speed*=.985;if(plane.speed<.05)plane.speed=0;let status='Taxi via Alpha. Keep the nosewheel on the yellow centerline.';const near=plane.x>875&&plane.y<590&&plane.y>410;if(plane.speed>12)status='Too fast for taxi. Slow down.';if(near&&plane.speed<1)status='Good. Holding short Runway 20R.';if(near&&plane.speed>1.5)status='Caution: hold-short line ahead.';document.getElementById('speed').textContent=Math.round(plane.speed);document.getElementById('heading').textContent=String(Math.round((plane.heading+360)%360)).padStart(3,'0');document.getElementById('status').textContent=status}
function mini(){ctx.save();ctx.translate(W-350,80);ctx.scale(.28,.28);ctx.globalAlpha=.93;airport();aircraft();ctx.restore()}function render(){update();cockpit();mini();requestAnimationFrame(render)}
function hold(id,on,off){const el=document.getElementById(id);['touchstart','pointerdown','mousedown'].forEach(e=>el.addEventListener(e,ev=>{ev.preventDefault();on()}));['touchend','touchcancel','pointerup','pointercancel','mouseup','mouseleave'].forEach(e=>el.addEventListener(e,ev=>{ev.preventDefault();if(off)off()}))}hold('left',()=>plane.steer=-1,()=>plane.steer=0);hold('right',()=>plane.steer=1,()=>plane.steer=0);hold('throttle',()=>plane.speed=Math.min(18,plane.speed+1.8));hold('brake',()=>plane.speed=Math.max(0,plane.speed-4));document.getElementById('nightBtn').onclick=()=>{night=!night;document.getElementById('mode').textContent=night?'Night':'Day'};document.getElementById('resetBtn').onclick=()=>{plane.x=180;plane.y=540;plane.heading=270;plane.speed=0;plane.steer=0};render();
})();
</script>
</body>
</html>
