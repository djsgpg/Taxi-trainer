<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Airport Taxi Trainer V6</title>
<style>
  :root { --bg:#07111f; --panel:rgba(7,14,24,.82); --text:#f4f7fb; --muted:#a9b5c7; --good:#3cff7a; --bad:#ff3b3b; --warn:#ffd84d; }
  html, body { margin:0; height:100%; overflow:hidden; background:#000; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif; color:var(--text); touch-action:none; user-select:none; -webkit-user-select:none; }
  #app { position:relative; width:100vw; height:100vh; background:#05080d; }
  canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
  #hud { position:absolute; top:10px; left:10px; right:10px; display:flex; gap:10px; align-items:flex-start; pointer-events:none; }
  #clearance { background:var(--panel); border:1px solid rgba(255,255,255,.18); border-radius:14px; padding:10px 12px; max-width:calc(100vw - 190px); box-shadow:0 6px 18px rgba(0,0,0,.35); }
  #clearance .label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
  #clearance .text { font-weight:700; font-size:16px; margin-top:3px; line-height:1.25; }
  #msg { margin-top:7px; font-size:13px; color:var(--muted); }
  #miniWrap { margin-left:auto; width:160px; height:160px; background:rgba(8,18,12,.9); border:2px solid rgba(255,255,255,.24); border-radius:14px; overflow:hidden; box-shadow:0 6px 18px rgba(0,0,0,.35); pointer-events:none; }
  #controls { position:absolute; left:0; right:0; bottom:0; display:grid; grid-template-columns:1fr 1.15fr 1fr; gap:10px; padding:12px; padding-bottom:calc(12px + env(safe-area-inset-bottom)); background:linear-gradient(transparent, rgba(0,0,0,.58) 30%, rgba(0,0,0,.82)); }
  button { min-height:72px; border:1px solid rgba(255,255,255,.25); border-radius:18px; background:#17263c; color:#fff; font-size:19px; font-weight:800; box-shadow:0 6px 0 #0a1320; touch-action:none; }
  button:active, button.down { transform:translateY(4px); box-shadow:0 2px 0 #0a1320; background:#24466f; }
  #reset { position:absolute; left:12px; bottom:calc(104px + env(safe-area-inset-bottom)); min-height:42px; padding:0 14px; border-radius:12px; font-size:14px; background:#263043; box-shadow:none; pointer-events:auto; }
  #overlay { position:absolute; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,.62); text-align:center; padding:24px; }
  #overlay .card { background:#101a28; border:1px solid rgba(255,255,255,.22); border-radius:22px; padding:26px 22px; max-width:520px; box-shadow:0 20px 50px rgba(0,0,0,.5); }
  #overlay h1 { margin:0 0 8px; font-size:42px; }
  #overlay p { margin:0; color:#dce4f0; font-size:18px; line-height:1.35; }
  #overlay button { margin-top:18px; width:100%; min-height:56px; box-shadow:none; }
</style>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>
  <canvas id="mini"></canvas>
  <div id="hud">
    <div id="clearance">
      <div class="label">Ground</div>
      <div class="text" id="clearanceText">Taxi to RWY 20R via A. Hold short RWY 20R.</div>
      <div id="msg">Stay on Taxiway A. Stop at the hold-short bars.</div>
    </div>
    <div id="miniWrap"></div>
  </div>
  <button id="reset">RESET</button>
  <div id="controls">
    <button id="left">LEFT</button>
    <button id="throttle">THROTTLE</button>
    <button id="right">RIGHT</button>
  </div>
  <div id="overlay"><div class="card"><h1 id="resultTitle"></h1><p id="resultText"></p><button id="again">Try Again</button></div></div>
</div>
<script>
(() => {
'use strict';
const scene = document.getElementById('scene');
const mini = document.getElementById('mini');
document.getElementById('miniWrap').appendChild(mini);
const ctx = scene.getContext('2d');
const mctx = mini.getContext('2d');
const msg = document.getElementById('msg');
const overlay = document.getElementById('overlay');
const resultTitle = document.getElementById('resultTitle');
const resultText = document.getElementById('resultText');

let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = Math.floor(innerWidth); H = Math.floor(innerHeight);
  scene.width = Math.floor(W*DPR); scene.height = Math.floor(H*DPR);
  scene.style.width=W+'px'; scene.style.height=H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  const r = document.getElementById('miniWrap').getBoundingClientRect();
  mini.width = Math.floor(r.width*DPR); mini.height = Math.floor(r.height*DPR);
  mini.style.width=r.width+'px'; mini.style.height=r.height+'px';
  mctx.setTransform(DPR,0,0,DPR,0,0);
}
addEventListener('resize', resize); resize();

// World coordinates: x east/west, y north/south. Aircraft starts on Taxiway A facing south.
const taxiA = { name:'A', x:-80, y1:-380, y2:360, width:46, centerColor:'#f8d84a' };
const taxiB = { name:'B', x1:-80, x2:210, y:20, width:42 };
const runway = { name:'20R', x:-80, y1:235, y2:640, width:80 };
const holdY = 204;
const destinationY = 188;
let plane, input, ended;
function reset(){
  plane = { x:taxiA.x, y:-300, hdg:Math.PI/2, speed:0 }; // hdg pi/2 = south/down world y
  input = { left:false, right:false, throttle:false };
  ended = false; overlay.style.display='none';
  msg.textContent = 'Stay on Taxiway A. Stop at the hold-short bars.';
}
reset();

function setBtn(id,key){
 const b=document.getElementById(id);
 const on=e=>{e.preventDefault(); input[key]=true; b.classList.add('down');};
 const off=e=>{e.preventDefault(); input[key]=false; b.classList.remove('down');};
 b.addEventListener('touchstart',on,{passive:false}); b.addEventListener('touchend',off,{passive:false}); b.addEventListener('touchcancel',off,{passive:false});
 b.addEventListener('mousedown',on); addEventListener('mouseup',off);
}
setBtn('left','left'); setBtn('right','right'); setBtn('throttle','throttle');
document.getElementById('reset').onclick=reset; document.getElementById('again').onclick=reset;

function worldToCamera(px,py){
  const dx=px-plane.x, dy=py-plane.y;
  const s=Math.sin(plane.hdg), c=Math.cos(plane.hdg);
  // forward is aircraft heading; right is perpendicular
  const forward = dx*s + dy*c;
  const right = dx*c - dy*s;
  return {right, forward};
}
function project(px,py,z=0){
  const p=worldToCamera(px,py);
  if(p.forward < 2) return null;
  const fov = Math.min(W,H)*0.9;
  const horizon = H*0.42;
  return { x:W/2 + (p.right*fov)/p.forward, y:horizon + ((28-z)*fov)/p.forward, scale:fov/p.forward, d:p.forward };
}
function drawPoly(points, fill, stroke=null, lw=1){
  const projected = points.map(p=>project(p[0],p[1],p[2]||0));
  if(projected.some(p=>!p)) return;
  ctx.beginPath(); ctx.moveTo(projected[0].x, projected[0].y);
  for(let i=1;i<projected.length;i++) ctx.lineTo(projected[i].x, projected[i].y);
  ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
  if(stroke){ctx.strokeStyle=stroke; ctx.lineWidth=lw; ctx.stroke();}
}
function drawGround(){
 const grd=ctx.createLinearGradient(0,0,0,H); grd.addColorStop(0,'#07122b'); grd.addColorStop(.42,'#0d172b'); grd.addColorStop(.421,'#26302c'); grd.addColorStop(1,'#141816');
 ctx.fillStyle=grd; ctx.fillRect(0,0,W,H);
 // horizon glow
 ctx.fillStyle='rgba(100,130,180,.16)'; ctx.fillRect(0,H*.38,W,10);
}
function drawSegmentedTaxiway(){
 // Draw continuous taxiway A in front and behind enough to remove voids.
 const x=taxiA.x, w=taxiA.width/2;
 for(let y=taxiA.y1; y<taxiA.y2; y+=58){
   drawPoly([[x-w,y],[x+w,y],[x+w,y+58],[x-w,y+58]], '#30343a', '#545b63', 1);
 }
 // Taxiway B branch, visible when approaching intersection
 const bw=taxiB.width/2;
 for(let x0=taxiB.x1; x0<taxiB.x2; x0+=58){
   drawPoly([[x0,taxiB.y-bw],[x0+58,taxiB.y-bw],[x0+58,taxiB.y+bw],[x0,taxiB.y+bw]], '#2e3338', '#505861', 1);
 }
 // runway ahead
 const rw=runway.width/2;
 for(let y=runway.y1; y<runway.y2; y+=80){
   drawPoly([[runway.x-rw,y],[runway.x+rw,y],[runway.x+rw,y+80],[runway.x-rw,y+80]], '#25282c', '#4e5560', 1);
 }
}
function drawLineWorld(points, color, width=3, dash=[]){
  const ps=points.map(p=>project(p[0],p[1],p[2]||0)).filter(Boolean);
  if(ps.length<2) return;
  ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=width; ctx.setLineDash(dash); ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); ctx.moveTo(ps[0].x,ps[0].y); for(let i=1;i<ps.length;i++) ctx.lineTo(ps[i].x,ps[i].y); ctx.stroke(); ctx.restore();
}
function drawMarkings(){
 // Taxiway A centerline only on actual taxiway
 let pts=[]; for(let y=taxiA.y1;y<=taxiA.y2;y+=40) pts.push([taxiA.x,y,.3]); drawLineWorld(pts,'#ffd84d',4,[22,16]);
 let bpts=[]; for(let x=taxiB.x1;x<=taxiB.x2;x+=40) bpts.push([x,taxiB.y,.3]); drawLineWorld(bpts,'#ffd84d',4,[22,16]);
 // edge reflectors/lights along A
 for(let y=taxiA.y1; y<taxiA.y2; y+=72){
   drawLight(taxiA.x-taxiA.width/2-4,y,'#2aa8ff'); drawLight(taxiA.x+taxiA.width/2+4,y,'#2aa8ff');
 }
 // hold short: two solid/two dashed yellow bars across taxiway just before runway
 for(const off of [-8,-3,5,11]){
   drawLineWorld([[taxiA.x-taxiA.width/2, holdY+off,.5],[taxiA.x+taxiA.width/2, holdY+off,.5]], '#ffd84d', off<0?5:3, off<0?[]:[12,8]);
 }
 // runway white edge/center markings ahead
 drawLineWorld([[runway.x,runway.y1,.4],[runway.x,runway.y2,.4]], '#f0f4ff', 4, [35,28]);
 drawLineWorld([[runway.x-runway.width/2,runway.y1,.4],[runway.x-runway.width/2,runway.y2,.4]], '#d8e1ef', 3);
 drawLineWorld([[runway.x+runway.width/2,runway.y1,.4],[runway.x+runway.width/2,runway.y2,.4]], '#d8e1ef', 3);
}
function drawLight(x,y,color){
 const p=project(x,y,1); if(!p || p.d>520) return;
 const r=Math.max(2, Math.min(8, p.scale*.08));
 ctx.beginPath(); ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=12; ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
}
function drawSign(label,x,y,side='right'){
 const p=project(x,y,8); if(!p || p.d>360) return;
 const sw=Math.max(42, Math.min(120, p.scale*1.8)); const sh=sw*.42;
 const sx=p.x-sw/2, sy=p.y-sh;
 ctx.fillStyle='#171717'; ctx.fillRect(sx,sy,sw,sh); ctx.strokeStyle='#ffd84d'; ctx.lineWidth=3; ctx.strokeRect(sx,sy,sw,sh);
 ctx.fillStyle='#ffd84d'; ctx.font=`${Math.max(16, sh*.62)}px Arial Black, sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(label,p.x,sy+sh/2+1);
 // post
 ctx.strokeStyle='#bbb'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(p.x,sy+sh); ctx.stroke();
}
function drawSigns(){
 drawSign('A', taxiA.x+taxiA.width/2+32, -180, 'right');
 drawSign('B →', taxiA.x+taxiA.width/2+34, -20, 'right');
 drawSign('RWY 20R', taxiA.x-taxiA.width/2-42, 155, 'left');
 drawSign('HOLD SHORT', taxiA.x+taxiA.width/2+48, 184, 'right');
}
function drawCockpit(){
 ctx.fillStyle='rgba(0,0,0,.45)'; ctx.beginPath(); ctx.ellipse(W/2,H+50,W*.62,H*.21,0,Math.PI,0); ctx.fill();
 ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='12px -apple-system,Arial'; ctx.textAlign='center'; ctx.fillText('First-person taxi view', W/2, H-112);
}
function drawScene(){
 drawGround(); drawSegmentedTaxiway(); drawMarkings(); drawSigns(); drawCockpit();
}
function drawMini(){
 const w=mini.clientWidth||160,h=mini.clientHeight||160; mctx.clearRect(0,0,w,h);
 mctx.fillStyle='#172b1d'; mctx.fillRect(0,0,w,h);
 const sx=w/360, sy=h/820; const ox=w/2 + 80*sx, oy=18;
 function mx(x){return ox+x*sx;} function my(y){return oy+(y+380)*sy;}
 mctx.strokeStyle='#555e66'; mctx.lineWidth=taxiA.width*sx; mctx.lineCap='round'; mctx.beginPath(); mctx.moveTo(mx(taxiA.x),my(taxiA.y1)); mctx.lineTo(mx(taxiA.x),my(taxiA.y2)); mctx.stroke();
 mctx.strokeStyle='#515962'; mctx.lineWidth=taxiB.width*sx; mctx.beginPath(); mctx.moveTo(mx(taxiB.x1),my(taxiB.y)); mctx.lineTo(mx(taxiB.x2),my(taxiB.y)); mctx.stroke();
 mctx.strokeStyle='#3f454d'; mctx.lineWidth=runway.width*sx; mctx.beginPath(); mctx.moveTo(mx(runway.x),my(runway.y1)); mctx.lineTo(mx(runway.x),my(runway.y2)); mctx.stroke();
 mctx.strokeStyle='#ffd84d'; mctx.lineWidth=2; mctx.beginPath(); mctx.moveTo(mx(taxiA.x-taxiA.width/2),my(holdY)); mctx.lineTo(mx(taxiA.x+taxiA.width/2),my(holdY)); mctx.stroke();
 mctx.fillStyle='#fff'; mctx.font='11px -apple-system,Arial'; mctx.fillText('A',mx(taxiA.x+28),my(-120)); mctx.fillText('B',mx(80),my(taxiB.y-22)); mctx.fillText('20R',mx(runway.x+45),my(300));
 // plane triangle
 const px=mx(plane.x), py=my(plane.y); mctx.save(); mctx.translate(px,py); mctx.rotate(plane.hdg-Math.PI/2);
 mctx.fillStyle='#3cff7a'; mctx.beginPath(); mctx.moveTo(8,0); mctx.lineTo(-6,-5); mctx.lineTo(-4,0); mctx.lineTo(-6,5); mctx.closePath(); mctx.fill(); mctx.restore();
}
function fail(reason){
 if(ended) return; ended=true; resultTitle.textContent='FAILED'; resultTitle.style.color='var(--bad)'; resultText.textContent=reason; overlay.style.display='flex';
}
function pass(){
 if(ended) return; ended=true; resultTitle.textContent='PASSED'; resultTitle.style.color='var(--good)'; resultText.textContent='You taxied via Taxiway A and stopped short of Runway 20R.'; overlay.style.display='flex';
}
function checkRules(){
 const onA = Math.abs(plane.x - taxiA.x) <= taxiA.width/2 + 8 && plane.y >= taxiA.y1-20 && plane.y <= holdY+2;
 const onB = plane.y > taxiB.y-taxiB.width/2-6 && plane.y < taxiB.y+taxiB.width/2+6 && plane.x > taxiB.x1 && plane.x < taxiB.x2;
 const onRunway = Math.abs(plane.x-runway.x) <= runway.width/2 && plane.y >= runway.y1;
 if(onRunway || plane.y > holdY+16) fail('You crossed the hold-short marking and entered Runway 20R without clearance.');
 else if(onB) fail('You turned onto Taxiway B, but the clearance was Taxiway A only.');
 else if(!onA && plane.y < holdY) fail('You taxied off the cleared taxiway surface.');
 else if(Math.abs(plane.x-taxiA.x)<14 && plane.y > destinationY-12 && plane.y < holdY-6 && !input.throttle) pass();
}
let last=performance.now();
function tick(t){
 const dt=Math.min(.035,(t-last)/1000); last=t;
 if(!ended){
   const turnRate = 1.9; // rad/sec, rotates on axis
   if(input.left) plane.hdg -= turnRate*dt;
   if(input.right) plane.hdg += turnRate*dt;
   plane.speed = input.throttle ? 78 : 0; // px/sec world speed
   plane.x += Math.sin(plane.hdg)*plane.speed*dt;
   plane.y += Math.cos(plane.hdg)*plane.speed*dt;
   checkRules();
 }
 drawScene(); drawMini(); requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
})();
</script>
</body>
</html>
