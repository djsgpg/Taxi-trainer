<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taxi Trainer</title>
<style>
body { margin:0; font-family:sans-serif; background:#87a9c9; overflow:hidden; }
#ui { position:absolute; top:10px; left:10px; color:white; }
#controls { position:absolute; bottom:0; width:100%; display:flex; }
button { flex:1; padding:20px; font-size:18px; }
#view { width:100%; height:100vh; background:linear-gradient(#87a9c9 40%, #333 40%); position:relative; }
.centerline { position:absolute; width:6px; height:200%; background:yellow; left:50%; transform:translateX(-50%); }
.sign { position:absolute; width:80px; height:40px; background:black; color:yellow; text-align:center; line-height:40px; border:2px solid yellow; }
#map { position:absolute; top:10px; right:10px; width:150px; height:150px; background:#2f4f2f; }
.dot { position:absolute; width:10px; height:10px; background:lime; border-radius:50%; }
</style>
</head>

<body>

<div id="view">
  <div class="centerline"></div>
  <div class="sign" style="right:20px; top:60%">A</div>
  <div id="map"><div id="dot" class="dot"></div></div>
</div>

<div id="ui">
  <div id="status">Taxi via Alpha</div>
</div>

<div id="controls">
  <button ontouchstart="turn=-1" ontouchend="turn=0">LEFT</button>
  <button ontouchstart="throttle=1" ontouchend="throttle=0">THROTTLE</button>
  <button ontouchstart="turn=1" ontouchend="turn=0">RIGHT</button>
</div>

<script>
let x=75, y=120, heading=0;
let throttle=0, turn=0;

function update(){
  if(throttle){
    x += Math.sin(heading)*1.5;
    y -= Math.cos(heading)*1.5;
  }
  heading += turn*0.05;

  document.getElementById("dot").style.left = x + "px";
  document.getElementById("dot").style.top = y + "px";

  requestAnimationFrame(update);
}

update();
</script>

</body>
</html>
