<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Airport Taxi Trainer</title>
<style>
  :root{
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --control-h: 92px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#061226; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    touch-action:none;
  }
  canvas{ display:block; width:100vw; height:100vh; }

  #message{
    position:fixed;
    top:14px;
    left:252px;
    right:252px;
    min-height:76px;
    color:#eaf2ff;
    background:rgba(3,13,31,.82);
    border:1px solid rgba(180,205,240,.35);
    border-radius:16px;
    padding:14px 18px;
    z-index:40;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
    line-height:1.35;
    backdrop-filter: blur(8px);
  }
  #message .title{ font-size:18px; font-weight:800; margin-bottom:4px; }
  #message .sub{ font-size:15px; color:#b9c7d8; }

  #reset{
    position:fixed;
    left:16px;
    bottom:calc(var(--control-h) + var(--safe-bottom) + 16px);
    width:102px;
    height:54px;
    z-index:60;
    border-radius:14px;
    border:1px solid rgba(185,210,245,.45);
    background:#263752;
    color:white;
    font-weight:900;
    font-size:17px;
  }

  #dayNight{
    position:fixed;
    left:130px;
    bottom:calc(var(--control-h) + var(--safe-bottom) + 16px);
    width:102px;
    height:54px;
    z-index:60;
    border-radius:14px;
    border:1px solid rgba(185,210,245,.45);
    background:#ffca28;
    color:#111;
    font-weight:900;
    font-size:17px;
  }

  #controls{
    position:fixed;
    bottom:var(--safe-bottom);
    left:0; right:0;
    height:var(--control-h);
    display:flex;
    gap:12px;
    padding:10px 16px 12px 16px;
    z-index:55;
    background:linear-gradient(to top, rgba(4,10,20,.85), rgba(4,10,20,.15));
  }
  #controls button{
    flex:1;
    height:70px;
    border-radius:18px;
    border:2px solid rgba(150,185,225,.55);
    background:#18314f;
    color:white;
    font-size:23px;
    font-weight:900;
  }
  #throttle{ background:#1f6f48!important; }
</style>
</head>
<body>

<canvas id="sim"></canvas>

<div id="message">
  <div class="title">Taxi to RWY 20R via A. Hold short RWY 20R.</div>
  <div class="sub">Stay on the yellow centerline and stop before the hold-short bars.</div>
</div>

<button id="reset">RESET</button>
<button id="dayNight">DAY</button>

<div id="controls">
  <button id="left">LEFT</button>
  <button id="throttle">THROTTLE</button>
  <button id="right">RIGHT</button>
</div>

<script>
let mode='day';

document.getElementById('dayNight').onclick=()=>{
  mode = mode==='day'?'night':'day';
  document.getElementById('dayNight').textContent = mode.toUpperCase();
};

const canvas=document.getElementById('sim');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize(); addEventListener('resize',resize);

let x=0, y=0, hdg=0;
let input={l:false,r:false,t:false};

document.getElementById('left').ontouchstart=()=>input.l=true;
document.getElementById('left').ontouchend=()=>input.l=false;
document.getElementById('right').ontouchstart=()=>input.r=true;
document.getElementById('right').ontouchend=()=>input.r=false;
document.getElementById('throttle').ontouchstart=()=>input.t=true;
document.getElementById('throttle').ontouchend=()=>input.t=false;

function loop(){
  if(input.l) hdg-=.03;
  if(input.r) hdg+=.03;
  if(input.t){
    x+=Math.cos(hdg)*2;
    y+=Math.sin(hdg)*2;
  }

  ctx.fillStyle = mode==='night' ? '#061226' : '#9fd3ff';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = mode==='night' ? '#2f3436' : '#555';
  ctx.fillRect(canvas.width/2-100, canvas.height/2, 200, canvas.height);

  ctx.strokeStyle='yellow';
  ctx.lineWidth=4;
  ctx.beginPath();
  ctx.moveTo(canvas.width/2, canvas.height);
  ctx.lineTo(canvas.width/2, canvas.height/2);
  ctx.stroke();

  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
