<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Airport Taxi Trainer V7</title>
<style>
  html,body{margin:0;padding:0;overflow:hidden;background:#0b1220;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;color:white}
  #game{position:fixed;inset:0;width:100vw;height:100vh;background:#111;touch-action:none}
  #hud{position:fixed;left:12px;top:10px;z-index:10;background:rgba(20,32,45,.85);border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:12px 14px;max-width:560px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  #hud .top{font-weight:800;font-size:17px;margin-bottom:5px}.clearance{color:#ffe66d;letter-spacing:.08em;font-size:13px}.txt{font-size:15px;line-height:1.3}.status{margin-top:6px;font-weight:700}
  #banner{position:fixed;left:50%;top:48%;transform:translate(-50%,-50%);z-index:20;display:none;min-width:310px;max-width:80vw;text-align:center;border-radius:18px;padding:24px;background:rgba(0,0,0,.88);border:2px solid #fff;box-shadow:0 10px 40px rgba(0,0,0,.55)}
  #banner h1{margin:0 0 8px;font-size:40px}.pass h1{color:#6df28b}.fail h1{color:#ff6b6b}#banner p{margin:0 0 18px;font-size:18px}#banner button,#reset{background:#ffc928;color:#111;border:none;border-radius:13px;font-weight:800;padding:12px 18px;font-size:16px}
  #controls{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:10px 14px 14px;z-index:11;box-sizing:border-box;pointer-events:none}
  .ctrl{pointer-events:auto;height:72px;border-radius:14px;border:2px solid rgba(0,0,0,.45);font-size:25px;font-weight:900;background:#f1f1f1;color:#111;box-shadow:0 2px 6px rgba(0,0,0,.35);touch-action:none}.ctrl:active,.ctrl.active{filter:brightness(.82);transform:translateY(1px)}#throttle{background:#77e080}#left,#right{background:#eee}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud">
  <div class="top">Airport: KSNA Demo &nbsp; <button id="reset">Reset</button></div>
  <div class="clearance">GROUND CLEARANCE</div>
  <div class="txt">Taxi to Runway 20R via Alpha. Hold short Runway 20R.</div>
  <div class="status" id="status">Hold THROTTLE to taxi. Release to stop. Turn with LEFT/RIGHT.</div>
</div>
<div id="banner"><h1></h1><p></p><button onclick="resetSim()">Try Again</button></div>
<div id="controls">
  <button class="ctrl" id="left">◀ LEFT</button>
  <button class="ctrl" id="throttle">THROTTLE</button>
  <button class="ctrl" id="right">RIGHT ▶</button>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
let W=0,H=0,dpr=1;function resize(){dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));W=innerWidth;H=innerHeight;canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(dpr,0,0,dpr,0,0)}addEventListener('resize',resize);resize();
const A={x1:80,y1:355,x2:720,y2:355,w:42,name:'A'};const A1={x1:420,y1:520,x2:420,y2:185,w:38,name:'A1'};const RWY={x:785,y:140,w:60,h:430};const holdX=716;
let plane,inputs,ended=false,msg='';
function resetSim(){plane={x:145,y:355,hdg:0,speed:0};inputs={left:false,right:false,throttle:false};ended=false;msg='Taxi via Alpha. Hold short Runway 20R.';document.getElementById('status').textContent=msg;document.getElementById('banner').style.display='none'}resetSim();
function bind(id,key){const b=document.getElementById(id);function on(e){e.preventDefault();inputs[key]=true;b.classList.add('active')}function off(e){e.preventDefault();inputs[key]=false;b.classList.remove('active')}b.addEventListener('touchstart',on,{passive:false});b.addEventListener('touchend',off,{passive:false});b.addEventListener('touchcancel',off,{passive:false});b.addEventListener('mousedown',on);addEventListener('mouseup',off)}bind('left','left');bind('right','right');bind('throttle','throttle');document.getElementById('reset').onclick=resetSim;
function distToSeg(px,py,x1,y1,x2,y2){const vx=x2-x1,vy=y2-y1,wx=px-x1,wy=py-y1,c1=vx*wx+vy*wy,c2=vx*vx+vy*vy,t=Math.max(0,Math.min(1,c1/c2));const x=x1+t*vx,y=y1+t*vy;return {d:Math.hypot(px-x,py-y),t,x,y}}
function onAlpha(){let d=distToSeg(plane.x,plane.y,A.x1,A.y1,A.x2,A.y2);return d.d<A.w/2+6&&d.t>=0&&d.t<=1}
function onA1(){let d=distToSeg(plane.x,plane.y,A1.x1,A1.y1,A1.x2,A1.y2);return d.d<A1.w/2+4&&d.t>=0&&d.t<=1}
function fail(t){ended=true;const b=document.getElementById('banner');b.className='fail';b.querySelector('h1').textContent='FAIL';b.querySelector('p').textContent=t;b.style.display='block';document.getElementById('status').textContent=t}
function pass(){ended=true;const b=document.getElementById('banner');b.className='pass';b.querySelector('h1').textContent='PASS';b.querySelector('p').textContent='You stopped short of Runway 20R on Taxiway Alpha.';b.style.display='block';document.getElementById('status').textContent='Passed.'}
function update(){if(!ended){if(inputs.left)plane.hdg-=0.035;if(inputs.right)plane.hdg+=0.035;plane.speed=inputs.throttle?1.45:0;plane.x+=Math.cos(plane.hdg)*plane.speed;plane.y+=Math.sin(plane.hdg)*plane.speed;if(onA1())fail('Wrong taxiway: you turned onto Alpha One.');else if(!onAlpha())fail('You left the cleared taxiway Alpha.');else if(plane.x>holdX+6)fail('You crossed the Runway 20R hold-short marking.');else if(plane.x>holdX-22&&!inputs.throttle&&Math.abs(plane.hdg)<0.45)pass();}}
function worldToCam(px,py){const dx=px-plane.x,dy=py-plane.y;const c=Math.cos(-plane.hdg),s=Math.sin(-plane.hdg);return {f:dx*c-dy*s,r:dx*s+dy*c}}
function project(p){const horizon=H*0.43,scale=440/(p.f+80);return {x:W/2+p.r*scale,y:horizon+260*scale,w:scale}}
function drawWorldLine(x1,y1,x2,y2,color,width=3,dash=false){let pts=[];for(let i=0;i<=80;i++){const t=i/80;const p=worldToCam(x1+(x2-x1)*t,y1+(y2-y1)*t);if(p.f>-50)pts.push(project(p))}ctx.save();ctx.strokeStyle=color;ctx.lineWidth=width;if(dash)ctx.setLineDash([22,20]);ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();ctx.restore()}
function drawTaxiwaySegment(seg){const dx=seg.x2-seg.x1,dy=seg.y2-seg.y1,L=Math.hypot(dx,dy),nx=-dy/L,ny=dx/L,w=seg.w/2;const corners=[[seg.x1+nx*w,seg.y1+ny*w],[seg.x2+nx*w,seg.y2+ny*w],[seg.x2-nx*w,seg.y2-ny*w],[seg.x1-nx*w,seg.y1-ny*w]];const pts=corners.map(c=>project(worldToCam(c[0],c[1])));ctx.fillStyle='#3a3d3d';ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fill();drawWorldLine(seg.x1,seg.y1,seg.x2,seg.y2,'#ffd94a',4,true)}
function drawSign(wx,wy,text){const p=worldToCam(wx,wy);if(p.f<20||p.f>650)return;const q=project(p),size=Math.max(22,Math.min(70,210/(p.f/70)));ctx.fillStyle='black';ctx.strokeStyle='yellow';ctx.lineWidth=3;ctx.fillRect(q.x-size,q.y-size*.35,size*2,size*.7);ctx.strokeRect(q.x-size,q.y-size*.35,size*2,size*.7);ctx.fillStyle='yellow';ctx.font=`${Math.floor(size*.45)}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,q.x,q.y)}
function drawHoldShort(){for(let off of [-13,-7,7,13]) drawWorldLine(holdX, A.y1+off, holdX, A.y1+off, '#ffd94a',5,false); for(let y=A.y1-24;y<=A.y1+24;y+=8){drawWorldLine(holdX-10,y,holdX+10,y,'#ffd94a',3,false)}}
function render3D(){let grad=ctx.createLinearGradient(0,0,0,H*.5);grad.addColorStop(0,'#7fb1df');grad.addColorStop(1,'#c9dcf0');ctx.fillStyle=grad;ctx.fillRect(0,0,W,H*.43);ctx.fillStyle='#222';ctx.fillRect(0,H*.43,W,H*.57);drawTaxiwaySegment(A);drawTaxiwaySegment(A1);ctx.fillStyle='rgba(45,45,45,.95)';const r1=project(worldToCam(RWY.x,RWY.y)),r2=project(worldToCam(RWY.x,RWY.y+RWY.h)),r3=project(worldToCam(RWY.x+RWY.w,RWY.y+RWY.h)),r4=project(worldToCam(RWY.x+RWY.w,RWY.y));ctx.beginPath();[r1,r2,r3,r4].forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.closePath();ctx.fill();drawHoldShort();drawSign(545,382,'A');drawSign(675,326,'20R-2L');drawSign(405,300,'A1');}
function mapX(x){return W-255+x*0.22}function mapY(y){return 35+y*0.22}function drawMap(){ctx.save();ctx.globalAlpha=.96;ctx.fillStyle='#729069';ctx.fillRect(W-275,18,250,185);ctx.strokeStyle='rgba(255,255,255,.35)';ctx.strokeRect(W-275,18,250,185);function rectLine(seg){ctx.strokeStyle='#5a6566';ctx.lineWidth=seg.w*.22;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(mapX(seg.x1),mapY(seg.y1));ctx.lineTo(mapX(seg.x2),mapY(seg.y2));ctx.stroke();ctx.strokeStyle='#f5d64a';ctx.lineWidth=2;ctx.setLineDash([8,7]);ctx.beginPath();ctx.moveTo(mapX(seg.x1),mapY(seg.y1));ctx.lineTo(mapX(seg.x2),mapY(seg.y2));ctx.stroke();ctx.setLineDash([])}rectLine(A);rectLine(A1);ctx.fillStyle='#3c4348';ctx.fillRect(mapX(RWY.x),mapY(RWY.y),RWY.w*.22,RWY.h*.22);ctx.fillStyle='white';ctx.font='12px sans-serif';ctx.fillText('20R',mapX(RWY.x)+6,mapY(RWY.y)+20);ctx.fillStyle='#45ff65';ctx.beginPath();ctx.arc(mapX(plane.x),mapY(plane.y),6,0,Math.PI*2);ctx.fill();ctx.strokeStyle='white';ctx.beginPath();ctx.moveTo(mapX(plane.x),mapY(plane.y));ctx.lineTo(mapX(plane.x)+Math.cos(plane.hdg)*14,mapY(plane.y)+Math.sin(plane.hdg)*14);ctx.stroke();ctx.restore()}
function draw(){ctx.clearRect(0,0,W,H);render3D();drawMap();update();requestAnimationFrame(draw)}draw();
</script>
</body>
</html>
