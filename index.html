<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Airport Taxi Trainer</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  touch-action: none;
  font-family: Arial, sans-serif;
  background: #111;
}
canvas {
  display: block;
  width: 100vw;
  height: 100vh;
}
#controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 92px;
  display: flex;
  gap: 8px;
  padding: 8px;
  box-sizing: border-box;
  z-index: 10;
}
button {
  flex: 1;
  font-size: 24px;
  font-weight: bold;
  border-radius: 14px;
  border: 2px solid #aaa;
  background: #eee;
}
#throttle {
  background: #7ee283;
}
#message {
  position: fixed;
  top: 12px;
  left: 12px;
  color: white;
  background: rgba(0,0,0,.55);
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 18px;
  z-index: 20;
  max-width: 70vw;
}
#reset {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 20;
  width: 90px;
  height: 48px;
  font-size: 18px;
  background: #ffca28;
}
</style>
</head>
<body>

<canvas id="sim"></canvas>

<div id="message">
  <b>Clearance:</b> Taxi to Runway 20R via Alpha. Hold short Runway 20R.
</div>

<button id="reset">Reset</button>

<div id="controls">
  <button id="left">LEFT</button>
  <button id="throttle">THROTTLE</button>
  <button id="right">RIGHT</button>
</div>

<script>
const canvas = document.getElementById("sim");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth * devicePixelRatio;
  canvas.height = innerHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
addEventListener("resize", resize);
resize();

let keys = { left:false, right:false, throttle:false };
let gameOver = false;
let result = "";

const W = () => innerWidth;
const H = () => innerHeight;

let aircraft;

const taxiways = [
  { name:"A", x1:-420, y1:0, x2:420, y2:0, width:70 },
  { name:"A1", x1:260, y1:0, x2:370, y2:-110, width:60 },
  { name:"B", x1:0, y1:-260, x2:0, y2:210, width:60 },
  { name:"Ramp", x1:-390, y1:120, x2:-140, y2:120, width:90 }
];

const runway = { x1:420, y1:-240, x2:420, y2:240, width:90 };
const holdShortX = 315;

function reset() {
  aircraft = { x:-330, y:0, heading:0 };
  gameOver = false;
  result = "";
  document.getElementById("message").innerHTML =
    "<b>Clearance:</b> Taxi to Runway 20R via Alpha. Hold short Runway 20R.";
}
reset();

function bindButton(id, prop) {
  const el = document.getElementById(id);
  el.addEventListener("touchstart", e => { e.preventDefault(); keys[prop]=true; });
  el.addEventListener("touchend", e => { e.preventDefault(); keys[prop]=false; });
  el.addEventListener("touchcancel", e => { e.preventDefault(); keys[prop]=false; });
  el.addEventListener("mousedown", e => { keys[prop]=true; });
  el.addEventListener("mouseup", e => { keys[prop]=false; });
  el.addEventListener("mouseleave", e => { keys[prop]=false; });
}
bindButton("left","left");
bindButton("right","right");
bindButton("throttle","throttle");
document.getElementById("reset").onclick = reset;

function fail(msg) {
  if (gameOver) return;
  gameOver = true;
  result = "FAILED: " + msg;
  document.getElementById("message").innerHTML = "<b style='color:#ff6b6b'>FAILED:</b> " + msg;
}
function pass() {
  if (gameOver) return;
  gameOver = true;
  result = "PASSED";
  document.getElementById("message").innerHTML = "<b style='color:#7CFC00'>PASSED:</b> Held short of Runway 20R.";
}

function distanceToSegment(px,py,x1,y1,x2,y2){
  const A=px-x1, B=py-y1, C=x2-x1, D=y2-y1;
  const dot=A*C+B*D;
  const len=C*C+D*D;
  let t=Math.max(0,Math.min(1,dot/len));
  const x=x1+t*C, y=y1+t*D;
  return Math.hypot(px-x,py-y);
}

function onTaxiway(name) {
  const tw = taxiways.find(t=>t.name===name);
  return distanceToSegment(aircraft.x,aircraft.y,tw.x1,tw.y1,tw.x2,tw.y2) < tw.width/2;
}

function update() {
  if (!gameOver) {
    if (keys.left) aircraft.heading -= 0.035;
    if (keys.right) aircraft.heading += 0.035;

    if (keys.throttle) {
      aircraft.x += Math.cos(aircraft.heading) * 2.0;
      aircraft.y += Math.sin(aircraft.heading) * 2.0;
    }

    if (!onTaxiway("A")) {
      fail("You left cleared Taxiway Alpha.");
    }

    if (aircraft.x > holdShortX) {
      fail("You crossed the Runway 20R hold-short marking.");
    }

    if (aircraft.x > 285 && aircraft.x < 315 && Math.abs(aircraft.y) < 35 && !keys.throttle) {
      pass();
    }
  }
}

function worldToCamera(wx, wy) {
  const dx = wx - aircraft.x;
  const dy = wy - aircraft.y;

  const cos = Math.cos(-aircraft.heading);
  const sin = Math.sin(-aircraft.heading);

  const cx = dx*cos - dy*sin;
  const cy = dx*sin + dy*cos;

  return { forward: cx, side: cy };
}

function project(forward, side) {
  const horizon = H()*0.42;
  const scale = 520 / Math.max(20, forward);
  return {
    x: W()/2 + side * scale,
    y: horizon + 25000 / Math.max(20, forward),
    scale
  };
}

function drawTaxiway3D() {
  const horizon = H()*0.42;

  ctx.fillStyle = "#8fb3d7";
  ctx.fillRect(0,0,W(),horizon);

  ctx.fillStyle = "#2d2f30";
  ctx.fillRect(0,horizon,W(),H()-horizon);

  for (let d=40; d<900; d+=45) {
    const left = project(d, -35);
    const right = project(d, 35);
    const left2 = project(d+45, -35);
    const right2 = project(d+45, 35);

    ctx.fillStyle = "#3b3f40";
    ctx.beginPath();
    ctx.moveTo(left.x,left.y);
    ctx.lineTo(right.x,right.y);
    ctx.lineTo(right2.x,right2.y);
    ctx.lineTo(left2.x,left2.y);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "#ffd94a";
    ctx.lineWidth = Math.max(2, left.scale*0.6);
    ctx.beginPath();
    const c1 = project(d,0);
    const c2 = project(d+24,0);
    ctx.moveTo(c1.x,c1.y);
    ctx.lineTo(c2.x,c2.y);
    ctx.stroke();
  }

  drawHoldShort3D();
  drawSigns3D();
}

function drawHoldShort3D() {
  const cam = worldToCamera(holdShortX,0);
  if (cam.forward > 20 && cam.forward < 700) {
    const y1 = project(cam.forward, -35);
    const y2 = project(cam.forward, 35);

    ctx.strokeStyle = "#ffd900";
    ctx.lineWidth = 4;
    for (let offset of [-8,-2,5,11]) {
      const a = project(cam.forward+offset, -35);
      const b = project(cam.forward+offset, 35);
      ctx.beginPath();
      ctx.moveTo(a.x,a.y);
      ctx.lineTo(b.x,b.y);
      ctx.stroke();
    }

    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText("HOLD SHORT RWY 20R", y1.x - 20, y1.y - 35);
  }
}

function drawSigns3D() {
  const signs = [
    {label:"A", x:-120, y:-55},
    {label:"A1 →", x:235, y:-55},
    {label:"20R-2L", x:300, y:58}
  ];

  for (const s of signs) {
    const cam = worldToCamera(s.x,s.y);
    if (cam.forward > 30 && cam.forward < 650) {
      const p = project(cam.forward, cam.side);
      const size = Math.max(22, Math.min(70, p.scale*10));
      ctx.fillStyle = s.label.includes("20R") ? "#b00000" : "#050505";
      ctx.strokeStyle = "yellow";
      ctx.lineWidth = 2;
      ctx.fillRect(p.x-size/2, p.y-size/3, size, size/2);
      ctx.strokeRect(p.x-size/2, p.y-size/3, size, size/2);
      ctx.fillStyle = "yellow";
      ctx.font = `${size/4}px Arial`;
      ctx.textAlign = "center";
      ctx.fillText(s.label, p.x, p.y);
      ctx.textAlign = "left";
    }
  }
}

function mapX(x){ return W()-250 + (x+460)/920*220; }
function mapY(y){ return 30 + (y+280)/560*180; }

function drawMiniMap() {
  ctx.fillStyle = "rgba(20,70,30,.9)";
  ctx.fillRect(W()-260,20,240,210);

  for (const tw of taxiways) {
    ctx.strokeStyle = "#62696b";
    ctx.lineWidth = tw.width/5;
    ctx.beginPath();
    ctx.moveTo(mapX(tw.x1),mapY(tw.y1));
    ctx.lineTo(mapX(tw.x2),mapY(tw.y2));
    ctx.stroke();

    ctx.strokeStyle = "#ffd94a";
    ctx.lineWidth = 2;
    ctx.setLineDash([8,8]);
    ctx.beginPath();
    ctx.moveTo(mapX(tw.x1),mapY(tw.y1));
    ctx.lineTo(mapX(tw.x2),mapY(tw.y2));
    ctx.stroke();
    ctx.setLineDash([]);
  }

  ctx.strokeStyle = "#3b3f44";
  ctx.lineWidth = runway.width/5;
  ctx.beginPath();
  ctx.moveTo(mapX(runway.x1),mapY(runway.y1));
  ctx.lineTo(mapX(runway.x2),mapY(runway.y2));
  ctx.stroke();

  ctx.strokeStyle = "#ffd900";
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(mapX(holdShortX),mapY(-35));
  ctx.lineTo(mapX(holdShortX),mapY(35));
  ctx.stroke();

  ctx.fillStyle = "#00ff4c";
  ctx.beginPath();
  ctx.arc(mapX(aircraft.x), mapY(aircraft.y), 6, 0, Math.PI*2);
  ctx.fill();

  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(mapX(aircraft.x), mapY(aircraft.y));
  ctx.lineTo(mapX(aircraft.x)+Math.cos(aircraft.heading)*18, mapY(aircraft.y)+Math.sin(aircraft.heading)*18);
  ctx.stroke();
}

function drawHUD() {
  ctx.fillStyle = "rgba(0,0,0,.55)";
  ctx.fillRect(12,75,300,70);

  ctx.fillStyle = "white";
  ctx.font = "18px Arial";
  ctx.fillText("Taxiway: A", 25, 102);
  ctx.fillText("Heading: " + Math.round((aircraft.heading*180/Math.PI+360)%360) + "°", 25, 128);

  if (gameOver) {
    ctx.fillStyle = result === "PASSED" ? "rgba(0,150,0,.85)" : "rgba(170,0,0,.85)";
    ctx.fillRect(W()/2-190,H()/2-60,380,120);
    ctx.fillStyle = "white";
    ctx.font = "36px Arial";
    ctx.textAlign = "center";
    ctx.fillText(result, W()/2, H()/2+10);
    ctx.textAlign = "left";
  }
}

function loop() {
  update();
  drawTaxiway3D();
  drawMiniMap();
  drawHUD();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
